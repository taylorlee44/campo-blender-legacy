<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recon A/B — splat viewer (Phase A spike)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #ddd;
      font: 13px/1.4 ui-monospace, monospace; }
    #bar { padding: 8px 12px; display: flex; gap: 16px; align-items: center;
      border-bottom: 1px solid #333; }
    #panes { display: flex; height: calc(100% - 41px); }
    .pane { flex: 1; position: relative; border-right: 1px solid #333; }
    .pane:last-child { border-right: none; }
    .label { position: absolute; top: 8px; left: 8px; z-index: 2;
      background: #0008; padding: 2px 8px; border-radius: 4px; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="bar">
    <strong>Recon A/B</strong>
    <label>Left (e.g. Scaniverse): <input id="fileL" type="file" accept=".ply,.spz,.splat,.ksplat" /></label>
    <label>Right (e.g. gsplat): <input id="fileR" type="file" accept=".ply,.spz,.splat,.ksplat" /></label>
    <span style="color:#888">drag to orbit · scroll to zoom</span>
  </div>
  <div id="panes">
    <div class="pane"><span class="label">LEFT</span><canvas id="canvasL"></canvas></div>
    <div class="pane"><span class="label">RIGHT</span><canvas id="canvasR"></canvas></div>
  </div>

  <!--
    Standalone spike viewer. Loads two Gaussian splats side by side so we can eyeball
    server-side gsplat output against a Scaniverse reference (M0 quality proof).
    Self-contained on purpose — keep it OUT of the Next.js app so it stays deletable.

    Spark is the chosen THREE.js splat renderer (github.com/sparkjsdev/spark). The ESM
    URLs + API below follow Spark's documented shape; VERIFY against current Spark docs
    and pin versions before relying on results — APIs drift.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.169.0",
      "three/addons/": "https://esm.sh/three@0.169.0/examples/jsm/",
      "@sparkjsdev/spark": "https://esm.sh/@sparkjsdev/spark"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    function makePane(canvas) {
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(devicePixelRatio);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);
      const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
      camera.position.set(0, 1, 3);
      scene.add(new SparkRenderer({ renderer }));
      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;

      function resize() {
        const { clientWidth: w, clientHeight: h } = canvas.parentElement;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      new ResizeObserver(resize).observe(canvas.parentElement);
      resize();

      let mesh = null;
      function load(url) {
        if (mesh) scene.remove(mesh);
        mesh = new SplatMesh({ url });
        scene.add(mesh);
      }
      (function tick() {
        requestAnimationFrame(tick);
        controls.update();
        renderer.render(scene, camera);
      })();
      return load;
    }

    const loadL = makePane(document.getElementById("canvasL"));
    const loadR = makePane(document.getElementById("canvasR"));
    const wire = (inputId, load) =>
      document.getElementById(inputId).addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) load(URL.createObjectURL(file));
      });
    wire("fileL", loadL);
    wire("fileR", loadR);
  </script>
</body>
</html>
